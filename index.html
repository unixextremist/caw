<title>caw</title>
<style>
:root {
  --bg: #ffffff;
  --fg: #000000;
}
[data-theme="dark"] {
  --bg: #000000;
  --fg: #ffffff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: ui-monospace, SFMono-Regular, "Cascadia Mono", "Segoe UI Mono", "Liberation Mono", Menlo, Monaco, Consolas, monospace;
  background: var(--bg);
  color: var(--fg);
  line-height: 1.6;
  
}
#theme-btn {
  position: fixed;
  top: 16px;
  right: 16px;
  background: var(--bg);
  color: var(--fg);
  border: 1px solid var(--fg);
  padding: 4px 12px;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  text-transform: lowercase;
}
#theme-btn:hover { text-decoration: underline; }
.wrap {
  max-width: 640px;
  margin: 0 auto;
  padding: 64px 24px 48px;
}
.category {
  margin-bottom: 40px;
}
.category-name {
  font-size: 14px;
  font-weight: 700;
  text-transform: lowercase;
  letter-spacing: 0.05em;
  border-bottom: 1px solid var(--fg);
  padding-bottom: 6px;
  margin-bottom: 12px;
}
.entry {
  margin-bottom: 8px;
  font-size: 13px;
}
.entry a {
  color: var(--fg);
  text-decoration: none;
}
.entry a:hover { text-decoration: underline; }
.entry .desc {
  color: var(--fg);
  opacity: 0.6;
}
.sep { margin: 0 6px; opacity: 0.5; }
</style>
<base target="_blank">
</head>
<body>
<button id="theme-btn" onclick="toggleTheme()">theme</button>
<div class="wrap" id="app"><div style="font-size:18px;font-weight:700;margin-bottom:32px;border-bottom:1px solid var(--fg);padding-bottom:8px;">caw</div></div>
<div class="wrap" style="margin-top:48px;">
  <div style="font-size:14px;font-weight:700;text-transform:lowercase;letter-spacing:0.05em;border-bottom:1px solid var(--fg);padding-bottom:6px;margin-bottom:12px;">what is this</div>
  <p style="font-size:13px;line-height:1.7;margin-bottom:12px;">caw is a tor.taxi equivalent for non-js heavy / well written / non bloated websites on the regular web</p>
  <p style="font-size:13px;line-height:1.7;opacity:0.6;">feel free to submit pull requests at <a href="https://github.com/unixextremist/caw" target="_blank" rel="noopener" style="color:var(--fg);text-decoration:underline;">https://github.com/unixextremist/caw</a> (will move to codeberg soon enough)</p>

function init() {
  const saved = localStorage.getItem('theme');
  if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  else if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
  else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
  render();
}

function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const next = isDark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = data.map(cat => `
    <div class="category">
      <div class="category-name">${cat.name}</div>
      ${cat.entries.map(e => {
        const links = e.links.map(l => `<a href="${l.url}" target="_blank" rel="noopener">${l.text}</a>`).join('<span class="sep">/</span>');
        return `<div class="entry">${links} <span class="desc">${e.description}</span></div>`;
      }).join('')}
    </div>
  `).join('');
}

init();
</script>
